<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الذكية | Touch By Abou Alrim</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f4f4f4; color: #333; padding: 20px; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: #fff; padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; }
        .error-msg { color: red; display: none; margin-top: 10px; }
        .dashboard-header { background: #1a1a1a; color: #fff; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .dashboard-content { display: none; }
        .card { background: #fff; padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .btn-submit { background-color: #c9a054; color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        .btn-delete { background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .dashboard-content { display: none; }
        #imagePreviews { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid #ccc; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>لوحة تحكم <span>رامي</span></h2>
            <div class="form-group"><label>اسم المستخدم</label><input type="text" id="username"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" id="password"></div>
            <button class="btn-submit" onclick="checkLogin()">دخول</button>
            <div class="error-msg" id="errorMsg">البيانات غلط يا رامي!</div>
        </div>
    </div>

    <div class="dashboard-content" id="dashboardContent">
        <div class="container">
            <header class="dashboard-header"><h1>Touch | الإدارة</h1><button class="btn-submit" onclick="logout()">خروج</button></header>
            <section class="card">
                <h2>إضافة بوست جديد (صور متعددة)</h2>
                <form id="postForm">
                    <div class="form-group"><label>الصفحة</label><select id="postPage" required><option value="gypsum">الجبسم بورد</option><option value="furniture">دهان الموبيليا</option></select></div>
                    <div class="form-group"><label>العنوان</label><input type="text" id="postTitle" required></div>
                    
                    <div class="form-group">
                        <label>اختر صور الورشة (يمكن اختيار أكثر من صورة)</label>
                        <input type="file" id="postImageFiles" accept="image/*" multiple onchange="previewImages(this)">
                        <div id="imagePreviews"></div>
                    </div>
                    
                    <div class="form-group"><label>رابط فيديو يوتيوب (اختياري)</label><input type="url" id="videoUrl"></div>
                    <div class="form-group"><label>الوصف</label><textarea id="postDesc" rows="4" required></textarea></div>
                    <div class="form-group"><label>رابط إضافي للزبائن</label><input type="url" id="postLinks"></div>
                    <button type="submit" class="btn-submit" id="submitBtn">نشر العمل</button>
                </form>
            </section>
            <section class="card"><h2>المنشورات الحالية</h2><table id="postsTable"><thead><tr><th>العنوان</th><th>الصفحة</th><th>التاريخ</th><th>حذف</th></tr></thead><tbody id="postsTableBody"></tbody></table></section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJE9RDaxqogaP6ku-zX7pOEcEXhEdd1Qs",
            authDomain: "touch-aboualrim.firebaseapp.com",
            projectId: "touch-aboualrim",
            storageBucket: "touch-aboualrim.firebasestorage.app",
            messagingSenderId: "1034802739480",
            appId: "1:1034802739480:web:e1ecf69da0690ba959866d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // دوال تسجيل الدخول والبريفيو
        window.checkLogin = () => { if(username.value === 'aboualrim' && password.value === 'ramirami2000'){ loginOverlay.style.display='none'; dashboardContent.style.display='block'; loadPosts();} else {errorMsg.style.display='block';}}
        window.logout = () => location.reload();
        window.previewImages = (input) => { const previews = document.getElementById('imagePreviews'); previews.innerHTML = ''; if (input.files) { [...input.files].forEach(file => { const reader = new FileReader(); reader.onload = (e) => { previews.innerHTML += `<img src="${e.target.result}" class="preview-img">`; }; reader.readAsDataURL(file); }); } }

        // كود النشر مع Loop لرفع الصور المتعددة
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const imageFiles = document.getElementById('postImageFiles').files;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري رفع الصور ونشر المنشور...';
            btn.disabled = true;

            const imagesArray = []; // مصفوفة لتخزين كل روابط الصور

            try {
                //Loop لرفع كل صورة للسيرفر المجاني
                if (imageFiles.length > 0) {
                    for (let file of imageFiles) {
                        const formData = new FormData();
                        formData.append('image', file);
                        // استخدمنا مفتاح API الخاص بك
                        const response = await fetch('https://api.imgbb.com/1/upload?key=d4153c26566671cd622f560fa7986321', { method: 'POST', body: formData });
                        const result = await response.json();
                        if (result.success) imagesArray.push(result.data.url); // تخزين الرابط بالمصفوفة
                    }
                }

                // حفظ المنشور بالفايربيس كـ Array
                await addDoc(collection(db, "posts"), {
                    page: postPage.value,
                    title: postTitle.value,
                    desc: postDesc.value,
                    link: postLinks.value,
                    videoUrl: videoUrl.value,
                    imagesArray: imagesArray, // تخزين مصفوفة الروابط
                    createdAt: new Date().toLocaleDateString('ar-EG'),
                    timestamp: Date.now()
                });

                alert('تم النشر بنجاح بجميع الصور! 🎉');
                document.getElementById('postForm').reset();
                document.getElementById('imagePreviews').innerHTML = '';
                loadPosts();

            } catch (error) { console.error(error); alert('حدث خطأ في الرفع.'); }
            finally { btn.innerHTML = 'نشر العمل'; btn.disabled = false; }
        });

        // دوال الجدول والحذف
        async function loadPosts() {
            const tbody = document.getElementById('postsTableBody');
            tbody.innerHTML = '<tr><td colspan="4">جاري جلب البيانات...</td></tr>';
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            tbody.innerHTML = '';
            snap.forEach(doc => { const d = doc.data(); tbody.innerHTML += `<tr><td>${d.title}</td><td>${d.page === 'gypsum' ? 'جبسم بورد' : 'موبيليا'}</td><td>${d.createdAt}</td><td><button class="btn-delete" onclick="deletePost('${doc.id}')">حذف</button></td></tr>`; });
        }
        window.deletePost = async (id) => { if(confirm('متأكد؟')) { await deleteDoc(doc(db, "posts", id)); loadPosts(); } }
    </script>
</body>
</html>
