<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | Touch By Abou Alrim</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f4f4f4;
            color: #333;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ستايل صفحة تسجيل الدخول */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.3s;
        }

        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #222;
            font-size: 24px;
        }

        .login-box h2 span {
            color: #c9a054;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input, .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus, .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
            border-color: #c9a054;
            box-shadow: 0 0 5px rgba(201, 160, 84, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #c9a054;
        }

        .error-msg {
            color: #d9534f;
            font-size: 14px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            line-height: 1.5;
        }

        /* ستايل لوحة التحكم */
        .dashboard-content {
            display: none;
        }

        .dashboard-header {
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .dashboard-header h1 span {
            color: #c9a054;
        }

        .btn-logout {
            padding: 8px 16px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f4f4f4;
            padding-bottom: 10px;
            color: #222;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-submit {
            background-color: #c9a054;
            color: #fff;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
        }

        /* ستايل جدول التعديل والحذف */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background-color: #f9f9f9;
            color: #666;
            font-weight: 700;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-gypsum { background: #e6f7ff; color: #1890ff; }
        .badge-furniture { background: #f6ffed; color: #52c41a; }

        .actions-btn {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-delete { background-color: #ff4d4f; color: #fff; }
        .btn-delete:hover { background-color: #d9363e; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول المقفلة -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>لوحة تحكم <span>الأدمن رامي</span></h2>
            <div class="input-group">
                <label><i class="fas fa-user"></i> اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور">
            </div>
            <button class="btn-login" onclick="checkLogin()">تسجيل الدخول</button>
            <div class="error-msg" id="errorMsg">
                هذه الصفحة مخصصة للأدمن رامي لا تحاول الدخول اذا ليس لديك إذن
            </div>
        </div>
    </div>

    <!-- محتويات لوحة التحكم بعد الدخول الصحيح -->
    <div class="dashboard-content" id="dashboardContent">
        <div class="container">
            
            <header class="dashboard-header">
                <h1>لوحة الإدارة | <span>Touch</span></h1>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </header>

            <section class="card">
                <h2><i class="fas fa-plus-circle"></i> إضافة منشور عمل جديد</h2>
                <form id="postForm">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="postPage">إلى أي صفحة تريد النشر؟</label>
                            <select id="postPage" required>
                                <option value="" disabled selected>-- اختر القسم المستهدف --</option>
                                <option value="gypsum">أعمال الجبسم بورد (gypsum.html)</option>
                                <option value="furniture">أعمال دهان الموبيليا (furniture.html)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="postTitle">عنوان المنشور أو الورشة</label>
                            <input type="text" id="postTitle" placeholder="مثال: تنفيذ سقف مودرن في الأشرفية" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="postMedia">رفع صورة أو مقطع فيديو للعمل</label>
                            <input type="file" id="postMedia" accept="image/*,video/*">
                        </div>

                        <div class="form-group">
                            <label for="postLinks">إضافة روابط خارجية (إن وجدت)</label>
                            <input type="url" id="postLinks" placeholder="https://youtube.com/example_video">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="postDesc">الوصف أو تفاصيل المقالة عن العمل</label>
                        <textarea id="postDesc" rows="5" placeholder="اكتب تفاصيل ومراحل العمل والمواد المستخدمة هنا..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="postNotes">ملاحظات خاصة (تظهر لك فقط ولا تنشر للعامة)</label>
                        <input type="text" id="postNotes" placeholder="مثال: تم الاتفاق على السعر الكامل مع الزبون">
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i> نشر العمل الآن
                    </button>
                </form>
            </section>

            <section class="card">
                <h2><i class="fas fa-edit"></i> إدارة وحذف المنشورات السابقة</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>العنوان</th>
                                <th>صفحة النشر</th>
                                <th>تاريخ النشر</th>
                                <th>العمليات</th>
                            </tr>
                        </thead>
                        <tbody id="postsTableBody">
                            <!-- المنشورات الحقيقية تُجلب هنا بواسطة الفايربيس ديناميكياً -->
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

    <!-- كود ربط وإعدادات فايربيس المدمج -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // الـ Config الخاصة ببيانات مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyBJE9RDaxqogaP6ku-zX7pOEcEXhEdd1Qs",
            authDomain: "touch-aboualrim.firebaseapp.com",
            projectId: "touch-aboualrim",
            storageBucket: "touch-aboualrim.firebasestorage.app",
            messagingSenderId: "1034802739480",
            appId: "1:1034802739480:web:e1ecf69da0690ba959866d",
            measurementId: "G-HFFKY3EE6H"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.checkLogin = function() {
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginOverlay = document.getElementById('loginOverlay');
            const dashboardContent = document.getElementById('dashboardContent');

            if (userInp === 'aboualrim' && passInp === 'ramirami2000') {
                errorMsg.style.display = 'none';
                loginOverlay.style.display = 'none';
                dashboardContent.style.display = 'block';
                loadPreviousPosts();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        window.logout = function() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('dashboardContent').style.none = 'none';
            document.location.reload();
        }

        // دالة الرفع والنشر للـ Firebase
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = e.target.querySelector('.btn-submit');
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر والرفع...';
            btnSubmit.disabled = true;

            const postPage = document.getElementById('postPage').value;
            const postTitle = document.getElementById('postTitle').value;
            const postLinks = document.getElementById('postLinks').value;
            const postDesc = document.getElementById('postDesc').value;
            const postNotes = document.getElementById('postNotes').value;
            const mediaFile = document.getElementById('postMedia').files[0];

            let mediaUrl = "";
            let mediaType = "none";

            try {
                if (mediaFile) {
                    mediaType = mediaFile.type.startsWith('video/') ? 'video' : 'image';
                    const storageRef = ref(storage, `touch_media/${Date.now()}_${mediaFile.name}`);
                    const snapshot = await uploadBytes(storageRef, mediaFile);
                    mediaUrl = await getDownloadURL(snapshot.ref);
                }

                await addDoc(collection(db, "posts"), {
                    page: postPage,
                    title: postTitle,
                    link: postLinks,
                    desc: postDesc,
                    notes: postNotes,
                    mediaUrl: mediaUrl,
                    mediaType: mediaType,
                    timestamp: Date.now(),
                    createdAt: new Date().toLocaleDateString('ar-EG')
                });

                alert('تم نشر العمل بنجاح ونقله إلى الصفحة المستهدفة! 🔥');
                document.getElementById('postForm').reset();
                loadPreviousPosts();

            } catch (error) {
                console.error("حدث خطأ بالرفع: ", error);
                alert('حدث خطأ أثناء الرفع، يرجى التأكد من تفعيل وضع الاختبار وقواعد الحماية (Rules) في Firestore و Storage بكونسول فايربيس.');
            } finally {
                btnSubmit.innerHTML = '<i class="fas fa-paper-plane"></i> نشر العمل الآن';
                btnSubmit.disabled = false;
            }
        });

        // جلب المنشورات الحقيقية وعرضها بالجدول
        async function loadPreviousPosts() {
            const tbody = document.getElementById('postsTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">جاري جلب بياناتك الحقيقية...</td></tr>';
            
            try {
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = '';
                
                if(querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد أي منشورات مرفوعة سابقاً. اللوحة فارغة وجاهزة!</td></tr>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const badgeClass = post.page === 'gypsum' ? 'badge-gypsum' : 'badge-furniture';
                    const badgeText = post.page === 'gypsum' ? 'جبسم بورد' : 'دهان موبيليا';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${post.title}</td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        <td>${post.createdAt || 'غير محدد'}</td>
                        <td>
                            <div class="actions-btn">
                                <button class="btn-action btn-delete" onclick="deletePost('${docSnap.id}')"><i class="fas fa-trash-alt"></i> حذف</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">خطأ بقراءة البيانات، تأكد من تفعيل قواعد Firestore Rules وجعلها تسمح بالقراءة والكتابة.</td></tr>';
            }
        }

        window.deletePost = async function(id) {
            if (confirm("هل أنت متأكد من حذف هذا المنشور نهائياً من الموقع؟")) {
                await deleteDoc(doc(db, "posts", id));
                alert("تم الحذف بنجاح!");
                loadPreviousPosts();
            }
        }
    </script>
</body>
</html>
