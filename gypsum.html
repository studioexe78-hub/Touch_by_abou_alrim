<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأعمال الاحترافي | Touch By Abou Alrim</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --gold: #c9a054; --dark: #1a1a1a; --light: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--light); color: #333; }
        header { background: var(--dark); color: #fff; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .back-link { color: var(--gold); text-decoration: none; font-weight: bold; display: block; margin-top: 15px; }
        
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        /* تصميم البطاقة الجديد */
        .post-card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; height: 100%; border: 1px solid #eee; }
        .post-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .media-container { width: 100%; height: 230px; background: #000; overflow: hidden; position: relative; }
        .media-container img, .media-container iframe { width: 100%; height: 100%; object-fit: cover; border: none; }
        
        .post-info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .post-info h3 { font-size: 22px; color: var(--dark); margin-bottom: 12px; }
        .post-info p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 20px; flex-grow: 1; }
        
        .post-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #eee; }
        .date-tag { font-size: 13px; color: #999; }
        .action-btn { background: var(--gold); color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .action-btn:hover { background: var(--dark); }

        .loading-msg { grid-column: 1/-1; text-align: center; padding: 100px; font-size: 20px; color: #999; }
    </style>
</head>
<body>

    <header>
        <h1>لمساتنا في <span>الجبسم بورد</span></h1>
        <p>جودة، دقة، وفخامة في التنفيذ</p>
        <a href="index.html" class="back-link"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </header>

    <div class="container">
        <div class="posts-grid" id="mainContainer">
            <div class="loading-msg">جاري تحميل المعرض...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJE9RDaxqogaP6ku-zX7pOEcEXhEdd1Qs",
            authDomain: "touch-aboualrim.firebaseapp.com",
            projectId: "touch-aboualrim",
            storageBucket: "touch-aboualrim.firebasestorage.app",
            messagingSenderId: "1034802739480",
            appId: "1:1034802739480:web:e1ecf69da0690ba959866d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة ذكية لتحويل روابط يوتيوب العادية لروابط قابلة للتضمين
        function getMediaHTML(imgUrl, videoUrl) {
            if (videoUrl && videoUrl.includes('youtube.com/watch?v=')) {
                const vidId = videoUrl.split('v=')[1].split('&')[0];
                return `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
            } else if (videoUrl && videoUrl.includes('youtu.be/')) {
                const vidId = videoUrl.split('be/')[1];
                return `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
            } else if (imgUrl) {
                return `<img src="${imgUrl}" alt="عملنا">`;
            }
            return `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;">بدون وسائط</div>`;
        }

        async function loadData() {
            const container = document.getElementById('mainContainer');
            try {
                const q = query(collection(db, "posts"), where("page", "==", "gypsum")); // غيرها لـ furniture بصفحة الموبيليا
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    container.innerHTML = `<div class="loading-msg">لا يوجد أعمال حالياً.</div>`;
                    return;
                }
                
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="media-container">${getMediaHTML(data.imgUrl, data.videoUrl)}</div>
                        <div class="post-info">
                            <h3>${data.title}</h3>
                            <p>${data.desc}</p>
                            <div class="post-footer">
                                <span class="date-tag"><i class="far fa-calendar-alt"></i> ${data.createdAt || ''}</span>
                                ${data.link ? `<a href="${data.link}" target="_blank" class="action-btn">التفاصيل</a>` : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `<div class="loading-msg">خطأ في الاتصال.</div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
