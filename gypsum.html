<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أعمال الجبسم بورد | Touch By Abou Alrim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f9f9f9; color: #333; line-height: 1.6; }
        header { background: #1a1a1a; color: #fff; padding: 40px 20px; text-align: center; border-bottom: 4px solid #c9a054; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header h1 span { color: #c9a054; }
        .back-link { display: inline-block; margin-top: 15px; color: #fff; text-decoration: none; font-weight: bold; }
        .back-link:hover { color: #c9a054; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .post-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; border: 1px solid #eee; }
        .post-card:hover { transform: translateY(-10px); }
        .post-media img, .post-media video { width: 100%; height: 200px; object-fit: cover; border-bottom: 3px solid #c9a054; }
        .post-content { padding: 20px; }
        .post-date { font-size: 12px; color: #999; display: block; margin-bottom: 10px; }
        .post-content h3 { font-size: 20px; color: #1a1a1a; margin-bottom: 10px; }
        .post-content p { font-size: 14px; color: #666; margin-bottom: 15px; }
        .external-btn { display: inline-block; padding: 8px 16px; background: #c9a054; color: #fff; text-decoration: none; border-radius: 5px; font-size: 13px; font-weight: bold; }
        .loading-msg { text-align: center; padding: 50px; font-size: 18px; color: #666; grid-column: 1 / -1; }
        @media (max-width: 600px) { header h1 { font-size: 22px; } }
    </style>
</head>
<body>

    <header>
        <h1>معرض أعمال <span>الجبسم بورد</span></h1>
        <p>أحدث الديكورات والأسقف المستعارة التي نفذناها بدقة وإبداع</p>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للموقع الرئيسي</a>
    </header>

    <div class="container">
        <div class="posts-grid" id="gypsumContainer">
            <div class="loading-msg">جاري تحميل المعرض...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJE9RDaxqogaP6ku-zX7pOEcEXhEdd1Qs",
            authDomain: "touch-aboualrim.firebaseapp.com",
            projectId: "touch-aboualrim",
            storageBucket: "touch-aboualrim.firebasestorage.app",
            messagingSenderId: "1034802739480",
            appId: "1:1034802739480:web:e1ecf69da0690ba959866d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPosts() {
            const container = document.getElementById('gypsumContainer');
            try {
                const q = query(collection(db, "posts"), where("page", "==", "gypsum"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = `<div class="loading-msg">لا يوجد أعمال منشورة في هذا القسم حالياً.</div>`;
                    return;
                }
                
                container.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    let media = '';
                    if (post.imgUrl) {
                        media = `<div class="post-media"><img src="${post.imgUrl}" alt="صورة العمل"></div>`;
                    } else if (post.videoUrl) {
                        media = `<div class="post-media"><video controls><source src="${post.videoUrl}"></video></div>`;
                    }

                    const linkBtn = post.link ? `<a href="${post.link}" target="_blank" class="external-btn">شاهد المزيد</a>` : '';

                    container.innerHTML += `
                        <article class="post-card">
                            ${media}
                            <div class="post-content">
                                <span class="post-date"><i class="far fa-calendar-alt"></i> ${post.createdAt || ''}</span>
                                <h3>${post.title}</h3>
                                <p>${post.desc}</p>
                                ${linkBtn}
                            </div>
                        </article>
                    `;
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="loading-msg" style="color:red;">عذراً، فشل الاتصال بقاعدة البيانات. تأكد من إعدادات القواعد (Rules) في فايربيس.</div>`;
            }
        }
        loadPosts();
    </script>
</body>
</html>
